server {
    listen 80;
    server_name haproxy-admin.internal.yourdomain.com;

    # Enforce HTTPS in production
    # listen 443 ssl;
    # ssl_certificate ...
    # ssl_certificate_key ...

    location / {
        include proxy_params;
        proxy_pass http://unix:/opt/haproxy-admin/app.sock;
    }
}
